# Fully-containerised integration test run: MS SQL Server (with the custom CA /
# server cert baked in) + a Rust container that runs the whole tiberius suite
# against it. No Rust toolchain required on the host -- only Docker.
#
#   PROVIDER=aws_lc_rs docker compose -f docker-compose.test.yml up \
#       --build --abort-on-container-exit --exit-code-from tests
#
# The `tests` container shares the mssql network namespace, so `localhost:1433`
# (hard-coded in tests/custom-cert.rs) reaches the server and the SAN=localhost
# certificate validates.
services:
  mssql:
    build:
      context: docker/
      dockerfile: docker-mssql-2022.dockerfile
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "<YourStrong@Passw0rd>"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '<YourStrong@Passw0rd>' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  tests:
    image: rust:1-bookworm
    depends_on:
      mssql:
        condition: service_healthy
    network_mode: "service:mssql"   # localhost == the mssql container
    working_dir: /work
    volumes:
      - ./:/work
      - cargo-target:/work/target          # keep container artifacts off the host tree
      - cargo-registry:/usr/local/cargo/registry
    environment:
      TIBERIUS_TEST_CONNECTION_STRING: "server=tcp:localhost,1433;uid=sa;pwd=<YourStrong@Passw0rd>;TrustServerCertificate=true"
      PROVIDER: "${PROVIDER:-aws_lc_rs}"    # aws_lc_rs | ring | native-tls
      CARGO_TERM_COLOR: "always"
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        apt-get update -qq && apt-get install -y -qq cmake clang >/dev/null
        FEAT="tds73,sql-browser-tokio,sql-browser-async-std,sql-browser-smol,chrono,time,rust_decimal,bigdecimal"
        case "$$PROVIDER" in
          aws_lc_rs)  FEAT="$$FEAT,rustls,aws_lc_rs" ;;
          ring)       FEAT="$$FEAT,rustls,ring" ;;
          native-tls) FEAT="$$FEAT,native-tls" ;;
          *) echo "Unknown PROVIDER '$$PROVIDER'" >&2; exit 2 ;;
        esac
        echo ">> PROVIDER=$$PROVIDER features: $$FEAT"
        cargo test --no-default-features --features "$$FEAT" --no-fail-fast

volumes:
  cargo-target:
  cargo-registry:
